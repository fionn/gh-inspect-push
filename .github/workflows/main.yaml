name: CI

on: [push]

permissions:
  contents: read

jobs:

  lint:

    name: Lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint newlines
        uses: fionn/newline-linter@v1.0.3

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check dependency tidiness
        run: go mod tidy -diff

  build:

    name: Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v

      - name: Install gh extension
        run: gh extension install .

      - name: Execute
        run: gh inspect-push "$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
